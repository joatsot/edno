<script>
  const toggle = document.querySelector('.nav-toggle');
  const nav = document.querySelector('.main-nav');
  toggle.addEventListener('click', () => {
    nav.classList.toggle('open');
    toggle.setAttribute('aria-expanded', nav.classList.contains('open'));
  });
  nav.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => nav.classList.remove('open'));
  });

  // ── News from Google Sheets ──────────────────────────────────────
  const NEWS_URL = 'https://script.google.com/macros/s/AKfycbwVEev_sLw7wXNzUV6dlCsGO34Z2EDArJwoXRRo5XBoZPh2nV-K9XkH2K7c2Uyi6Tv0Ng/exec?type=news';

  const FALLBACK_NEWS = [
    { date: 'September 2022', category: 'News', content: 'Raff\'s musical drama "Samson" will receive its world premiere on Sept. 11 2022 at the Deutsche National Theater in Weimar.', linkUrl: '', linkText: '' },
    { date: 'September 2022', category: 'News', content: 'Raff\'s final opera "Die Eifersüchtigen" has been performed for the first time on Sept 3 in Arth (CH). The CD recording of the production will soon become available.', linkUrl: '', linkText: '' },
    { date: 'January 2023',   category: 'News', content: 'The opera in Bonn has scheduled an additional concert performance of Meyerbeer\'s "Ein Feldlager in Schlesien" on January 1, 2023.', linkUrl: '', linkText: '' },
    { date: 'September 2023', category: 'News', content: 'The record label Swiss Phonogram has recorded Raff\'s "Samson" as a studio production in September 2023.', linkUrl: '', linkText: '' },
    { date: '2025',           category: 'News', content: 'There are plans to record Raff\'s "Dame Kobold" in 2025 in Czechia.', linkUrl: '', linkText: '' },
    { date: 'Q2 2024',        category: 'News', content: 'All string quartets by Raff will be available in Edition Nordstern editions by Q2 2024.', linkUrl: '', linkText: '' },
    { date: 'September 2023', category: 'Next Publications', content: 'Raff: String Quartet No. 2', linkUrl: '', linkText: '' },
    { date: 'September 2023', category: 'Next Publications', content: 'Raff: Eight pieces for piano op. 216, "Aus der Adventszeit"', linkUrl: '', linkText: '' },
    { date: 'September 2023', category: 'Next Publications', content: 'Raff: String Quartet No. 3', linkUrl: '', linkText: '' },
    { date: 'September 2023', category: 'Next Publications', content: 'Raff: Song cycle op. 98, "Sangesfrühling"', linkUrl: '', linkText: '' },
  ];

  function renderNews(items) {
    const container = document.getElementById('news-container');
    // Group by category
    const groups = {};
    items.forEach(item => {
      const cat = item.category || 'News';
      if (!groups[cat]) groups[cat] = [];
      groups[cat].push(item);
    });

    // Ensure "News" always appears before "Next Publications"
    const categoryOrder = ['News', 'Next Publications'];
    const sortedGroups = Object.entries(groups).sort(([a], [b]) => {
      const ai = categoryOrder.indexOf(a), bi = categoryOrder.indexOf(b);
      if (ai === -1 && bi === -1) return 0;
      if (ai === -1) return 1;
      if (bi === -1) return -1;
      return ai - bi;
    });

    container.innerHTML = sortedGroups.map(([category, entries]) => {
      const catKey = 'news.cat.' + category.toLowerCase().replace(/ /g, '');
      const catLabel = (window.EdNoLang && window.EdNoLang.get) ? window.EdNoLang.get(catKey) : category;
      return `
      <div class="content-section">
        <h2>${catLabel}</h2>
        <ul class="news-list">
          ${entries.map(item => `
            <li>
              ${item.date ? `<span class="news-date">${item.date} — </span>` : ''}
              ${item.content}
              ${item.linkUrl ? ` <a href="${item.linkUrl}" target="_blank" rel="noopener">${item.linkText || 'Read more'}</a>` : ''}
            </li>
          `).join('')}
        </ul>
      </div>
    `;
    }).join('');
  }

  (NEWS_URL
    ? fetch(NEWS_URL).then(r => { if (!r.ok) throw new Error(); return r.json(); })
    : Promise.reject()
  )
    .then(data => renderNews(data))
    .catch(() => renderNews(FALLBACK_NEWS));
</script>

<script>
  // Auto-update footer date from Google Sheets
  (function() {
    var SHEETS_URL = 'https://script.google.com/macros/s/AKfycbwVEev_sLw7wXNzUV6dlCsGO34Z2EDArJwoXRRo5XBoZPh2nV-K9XkH2K7c2Uyi6Tv0Ng/exec?type=meta';
    fetch(SHEETS_URL).then(function(r){ return r.json(); }).then(function(d){
      var el = document.getElementById('footer-date');
      if (el && d.lastUpdated) {
        var date = new Date(d.lastUpdated);
        el.textContent = date.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
      }
    }).catch(function(){});
  })();
</script>
